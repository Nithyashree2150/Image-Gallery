<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXORA</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>

    <h1><i class="fa-solid fa-images"></i> PIXORA PRO.."Smart Search.Stunning Views" </h1>

    <div class="search-box">
        <input type="text" id="searchInput"
        placeholder=" Search images..">

        <i class="fa-solid fa-magnifying-glass"></i>
    </div>

</header>

<section class="filter-buttons">

    <button class="filter-btn active" data-filter="all">All</button>

    <button class="filter-btn" data-filter="nature">Nature</button>

    <button class="filter-btn" data-filter="cars">Cars</button>

    <button class="filter-btn" data-filter="animals">Animals</button>

    <button class="filter-btn" data-filter="travel">Travel</button>

    <button class="filter-btn" data-filter="architecture">Architecture</button>

</section>

<div class="gallery" id="gallery"></div>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

    <span class="close">&times;</span>

    <button class="prev">&#10094;</button>

    <img id="lightbox-img">

    <button class="next">&#10095;</button>

    <div class="caption" id="caption"></div>

</div>

<footer>

    <p>Designed with ❤️ using HTML, CSS & JavaScript</p>

</footer>

<script src="script.js"></script>

</body>
</html>
